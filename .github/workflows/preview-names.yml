name: 正式修改异常文件名 (执行清理)

on:
  workflow_dispatch:

jobs:
  rename-files:
    runs-on: ubuntu-latest
    steps:
      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装谷歌官方工具
        run: pip install google-api-python-client google-auth httplib2

      - name: 正式执行深度重命名
        env:
          SA_KEY: ${{ secrets.SA_JSON }}
        run: |
          cat << 'EOF' > rename.py
          import os, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          def clean_name(name):
              new_name = name.strip().strip('.')
              illegal_chars = {'<': '《', '>': '》', ':': '：', '"': '“', '/': '-', '\\': '-', '|': '丨', '?': '？', '*': '＊'}
              for char, replacement in illegal_chars.items():
                  new_name = new_name.replace(char, replacement)
              return new_name

          sa_info = json.loads(os.environ['SA_KEY'])
          creds = service_account.Credentials.from_service_account_info(sa_info)
          service = build('drive', 'v3', credentials=creds)

          print("=== 🚀 开始正式清洗 10TB 云盘非法文件名 ===")
          
          shared_items = service.files().list(q="sharedWithMe = true and trashed = false", fields="files(id, name, mimeType)").execute().get('files', [])
          renamed_count = 0
          
          def drill_down(folder_id):
              global renamed_count
              page_token = None
              while True:
                  res = service.files().list(
                      q=f"'{folder_id}' in parents and trashed = false",
                      fields="nextPageToken, files(id, name, mimeType)",
                      pageToken=page_token,
                      pageSize=1000
                  ).execute()
                  
                  for child in res.get('files', []):
                      old_name = child['name']
                      new_name = clean_name(old_name)
                      
                      if old_name != new_name:
                          try:
                              service.files().update(fileId=child['id'], body={'name': new_name}).execute()
                              print(f"✅ 成功修改：[{old_name}] -> [{new_name}]")
                              renamed_count += 1
                          except Exception as e:
                              print(f"❌ 修改失败：[{old_name}]，报错：{e}")
                              
                      if child['mimeType'] == 'application/vnd.google-apps.folder':
                          drill_down(child['id'])
                          
                  page_token = res.get('nextPageToken')
                  if not page_token:
                      break

          for item in shared_items:
              old_root = item['name']
              new_root = clean_name(old_root)
              if old_root != new_root:
                  try:
                      service.files().update(fileId=item['id'], body={'name': new_root}).execute()
                      print(f"✅ 成功修改：[{old_root}] -> [{new_root}]")
                      renamed_count += 1
                  except Exception as e:
                      print(f"❌ 修改失败：[{old_root}]，报错：{e}")
                  
              if item['mimeType'] == 'application/vnd.google-apps.folder':
                  drill_down(item['id'])

          print(f"=== 清洗彻底结束！共成功修改了 {renamed_count} 个文件/文件夹。 ===")
          EOF
          python rename.py
