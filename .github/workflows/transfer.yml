name: GDrive to 123Pan SA Transfer

on:
  workflow_dispatch:

jobs:
  transfer-data:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: 开启 BBR 优化
        run: |
          sudo sysctl -w net.core.default_qdisc=fq
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr

      - name: 安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 准备配置和独立密钥文件
        env:
          CONF: ${{ secrets.RCLONE_CONF }}
          SA_KEY: ${{ secrets.SA_JSON }}
        run: |
          mkdir -p ~/.config/rclone
          # 1. 写入基础配置
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"
          # 2. 将 JSON 密钥单独保存为一个物理文件，彻底避免格式解析错误
          python3 -c "import os; open('/tmp/sa.json', 'w').write(os.environ['SA_KEY'])"

      - name: 执行全量迁移
        run: |
          # 强制 Rclone 读取独立的密钥文件
          rclone copy gdrive: 123pan:/abc \
            --drive-service-account-file=/tmp/sa.json \
            -v --stats=15s --transfers=4 --checkers=8 \
            --ignore-errors --drive-acknowledge-abuse
