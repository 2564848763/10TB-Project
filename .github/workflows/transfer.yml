name: o 文件夹 终极极限对拷版

on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 1. 物理机底层网络魔改 (BBR & TCP 优化)
        run: |
          sudo sysctl -w net.core.default_qdisc=fq
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr
          sudo sysctl -w net.core.rmem_max=67108864
          sudo sysctl -w net.core.wmem_max=67108864
          sudo sysctl -w net.ipv4.tcp_rmem="4096 87380 67108864"
          sudo sysctl -w net.ipv4.tcp_wmem="4096 65536 67108864"
          sudo sysctl -w net.ipv4.tcp_mtu_probing=1
          ulimit -n 65535

      - name: 2. 部署 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 3. 动态构建挂载点 (Secrets 自动化)
        env:
          PIKPAK_USER: ${{ secrets.PIKPAK_USER }}
          PIKPAK_PASS: ${{ secrets.PIKPAK_PASS }}
          PAN123_USER: ${{ secrets.PAN123_USER }}
          PAN123_PASS: ${{ secrets.PAN123_PASS }}
        run: |
          rclone config create pikpak pikpak user "$PIKPAK_USER" pass "$PIKPAK_PASS"
          rclone config create 123pan webdav url "https://webdav.123pan.cn/webdav" vendor other user "$PAN123_USER" pass "$PAN123_PASS"

      - name: 4. 预建目录阵地
        run: |
          echo "=== 📁 正在 123云盘 开辟专属阵地 ==="
          rclone mkdir "123pan:/视频/o" || true

      - name: 5. 满血引擎启动 (o 文件夹定点爆破)
        run: |
          echo "=== 🚀 正在全力攻克文件夹: o ==="
          rclone copy "pikpak:/o" "123pan:/视频/o" -v \
            --transfers 24 \
            --checkers 64 \
            --fast-list \
            --buffer-size 128M \
            --multi-thread-streams 4 \
            --use-mmap \
            --size-only \
            --ignore-existing \
            --tpslimit 12 \
            --tpslimit-burst 12 \
            --low-level-retries 25 \
            --retries 20 \
            --timeout 15m \
            --contimeout 15m \
            --stats 15s \
            --stats-one-line
