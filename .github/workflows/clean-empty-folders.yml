name: 极致清理123云盘空文件夹

on:
  workflow_dispatch:

jobs:
  clean-empty-dirs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Rclone 核心组件
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 挂载 123云盘配置文件
        env:
          CONF: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"
          echo "=== 🔑 账号配置加载成功！ ==="

      - name: 3. 执行空文件夹深度清理
        run: |
          echo "=== 🚀 正在钻入 abc 文件夹执行深度清理... ==="
          
          # rmdirs：只删空文件夹
          # 123pan:/abc：精准锁定大门
          # --leave-root：保护 abc 这个最外层的总文件夹不被删掉
          # --checkers=32：开 32 个扫地机器人同时往下钻探
          
          rclone rmdirs 123pan:/abc --leave-root --checkers=32 -v
          
          echo "=== 🧹 垃圾清运完毕，空壳已全部摧毁！ ==="
