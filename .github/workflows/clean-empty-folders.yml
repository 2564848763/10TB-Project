name: 123云盘全自动去重与空壳清理

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 挂载配置
        env:
          CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"

      - name: 3. 第一步：全盘去重 (解决影子文件问题)
        run: |
          echo "=== 🛡️ 正在清理重复项，请稍后... ==="
          # rename 模式会将重名文件自动改名合并，解决“看似空其实有重复项”的问题
          rclone dedupe rename 123pan:abc -v --threads 16

      - name: 4. 第二步：强力扫地 (清理空文件夹)
        run: |
          echo "=== 🧹 正在执行官方 rmdirs 强力清理... ==="
          # rmdirs 是官方专门删空目录的，配合 -v 能看到每一条删除记录
          # --leave-root 保证 abc 文件夹本身不被删掉
          rclone rmdirs 123pan:abc --leave-root -v
