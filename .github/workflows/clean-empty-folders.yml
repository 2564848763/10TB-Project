name: 全盘大扫除-清理所有空文件夹

on:
  workflow_dispatch:

jobs:
  clean-empty-dirs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 挂载配置文件
        env:
          CONF: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"

      - name: 3. 照妖镜：查看网盘根目录
        run: |
          echo "=== 🔍 Rclone 已经进门，它目前看到了以下文件夹： ==="
          rclone lsd 123pan:

      - name: 4. 执行全盘深度清理
        run: |
          echo "=== 🚀 开始全盘扫描并清理（已修正路径） ==="
          
          # 注意：这次是 123pan: （冒号后面没有任何斜杠，代表真正的全盘大扫除）
          rclone rmdirs 123pan: --checkers=32 -v
          
          echo "=== 🧹 清理彻底完毕！ ==="
