name: 彻底粉碎abc空文件夹 (终极爆破修复版)

on:
  workflow_dispatch:

jobs:
  nuke-empty-dirs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 挂载配置
        env:
          CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"

      - name: 3. 执行单点核爆指令
        run: |
          echo "=== 🚀 开始深度扫描 123pan:/abc ==="
          
          rclone lsf "123pan:/abc" -R --dirs-only > dirs_raw.txt
          
          if [ ! -s dirs_raw.txt ]; then
              echo "❌ 未找到任何目录，请检查路径！"
              exit 0
          fi
          
          awk '{ print length($0), $0 }' dirs_raw.txt | sort -n -r | cut -d ' ' -f2- > dirs.txt
          
          total=$(wc -l < dirs.txt)
          echo "📡 共找到 $total 个子文件夹，开始逐一排查..."
          
          count=0
          while IFS= read -r dir; do
              # ！！！就是这里，去掉了那个坑人的 -a ！！！
              contents=$(rclone lsf "123pan:/abc/$dir")
              
              if [ -z "$contents" ]; then
                  echo "🎯 锁定纯白空壳: [$dir]"
                  
                  rclone purge "123pan:/abc/$dir"
                  
                  if [ $? -eq 0 ]; then
                      echo "   ✅ 物理爆破成功"
                      count=$((count+1))
                  else
                      echo "   ⚠️ purge失败，尝试备用 rmdir..."
                      rclone rmdir "123pan:/abc/$dir"
                  fi
              fi
          done < dirs.txt
          
          echo "=== 🧹 战斗彻底结束，共成功强杀了 $count 个空文件夹 ==="
