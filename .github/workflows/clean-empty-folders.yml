name: 123云盘全自动去重与空壳清理 (修正版)

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 挂载配置
        env:
          CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"

      - name: 3. 第一步：全盘去重 (关键：解决重名影子文件)
        run: |
          echo "=== 🛡️ 正在清理重复项，请稍后... ==="
          # 删掉了不支持的 --threads 标志
          # rename 模式会将重名文件自动加后缀，从而消除导致文件夹无法删除的“逻辑冲突”
          rclone dedupe rename 123pan:abc -v

      - name: 4. 第二步：强力扫地 (只清理空文件夹)
        run: |
          echo "=== 🧹 正在执行官方 rmdirs 强力清理... ==="
          # rmdirs 绝对只删空目录，有任何文件（哪怕是 0 字节文件）都会跳过，极其安全
          rclone rmdirs 123pan:abc --leave-root -v
