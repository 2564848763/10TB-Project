name: 删除123网盘空文件夹(修正版)

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行清理脚本
        env:
          PAN123_USER: ${{ secrets.PAN123_USER }}
          PAN123_PASS: ${{ secrets.PAN123_PASS }}
        run: |
          pip install webdavclient3
          python -c "
          import os
          from webdav3.client import Client

          client = Client({
              'webdav_hostname': 'https://webdav.123pan.cn',
              'webdav_login': os.environ['PAN123_USER'],
              'webdav_password': os.environ['PAN123_PASS']
          })

          ROOT = '/webdav'  # 你的123网盘WebDAV根路径
          dirs = []
          parent_of = {}
          stats = {'deleted': 0, 'scanned': 0, 'errors': []}

          def scan(path):
              try:
                  items = client.list(path, get_info=True)
              except Exception as e:
                  stats['errors'].append(f'扫描失败 {path}: {e}')
                  return
              for item in items:
                  if item['path'].rstrip('/') == path.rstrip('/'):
                      continue
                  if item['isdir']:
                      child = item['path']
                      parent_of[child] = path
                      dirs.append(child)
                      stats['scanned'] += 1
                      scan(child)

          print(f'🌀 开始扫描根目录: {ROOT}')
          scan(ROOT)
          print(f'📂 共扫描到 {stats[\"scanned\"]} 个文件夹')
          for err in stats['errors']:
              print(f'   ⚠️ {err}')

          # 按深度从深到浅排序
          dirs.sort(key=lambda p: p.count('/'), reverse=True)

          def is_empty(path):
              try:
                  items = client.list(path)
                  filenames = [i for i in items if i.strip() not in ('', '.', '..')]
                  return len(filenames) == 0
              except Exception as e:
                  stats['errors'].append(f'检查空目录失败 {path}: {e}')
                  return False

          def try_delete(path):
              if is_empty(path):
                  try:
                      client.rmdir(path)
                      print(f'✅ 已删除空文件夹: {path}')
                      stats['deleted'] += 1
                      # 向上回溯，父文件夹可能也变空
                      parent = parent_of.get(path)
                      if parent and parent != ROOT:
                          try_delete(parent)
                  except Exception as e:
                      stats['errors'].append(f'删除失败 {path}: {e}')

          for d in dirs:
              try_delete(d)

          print(f'🎯 共删除空文件夹: {stats[\"deleted\"]}')
          if stats['errors']:
              print('⚠️ 运行中出现以下错误:')
              for e in stats['errors']:
                  print(f'   - {e}')
          print('🎉 清理流程结束')
          "
