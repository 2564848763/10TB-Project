name: 最终版清理abc空文件夹

on:
  workflow_dispatch:

jobs:
  clean-empty-dirs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 挂载配置
        env:
          CONF: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"

      - name: 3. 执行原生底层的纯净版清理
        run: |
          echo "=== 🚀 开始扫描 abc 文件夹 ==="
          
          # 核心修正1：获取所有目录，并切掉导致报错的尾部斜杠
          # 核心修正2：计算文件夹深度并倒序排列（先处理最深层的，再处理外层的）
          rclone lsf "123pan:abc" -R --dirs-only | sed 's#/$##' | awk -F'/' '{print NF, $0}' | sort -nr | cut -d' ' -f2- > dirs.txt
          
          total=$(wc -l < dirs.txt)
          echo "📡 共找到 $total 个子文件夹，开始逐一排查..."
          
          count=0
          # 核心修正3：使用原生 Bash 循环，彻底告别 Python 的语法报错
          while IFS= read -r dir; do
              # 跳过空行
              if [ -z "$dir" ]; then continue; fi
              
              # 拿手电筒检查文件夹内部是否有内容
              contents=$(rclone lsf "123pan:abc/$dir")
              
              if [ -z "$contents" ]; then
                  echo "🎯 发现纯空文件夹: [$dir]"
                  
                  # 动用强制删除命令抹除
                  rclone purge "123pan:abc/$dir"
                  
                  # 检查执行结果
                  if [ $? -eq 0 ]; then
                      echo "   ✅ 删除成功"
                      count=$((count+1))
                  else
                      echo "   ⚠️ 删除失败，跳过"
                  fi
              fi
          done < dirs.txt
          
          echo "=== 🧹 任务彻底结束，共成功删除了 $count 个空文件夹 ==="
