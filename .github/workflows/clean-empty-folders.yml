name: 强制粉碎空壳-火力演习(只看不删)

on:
  workflow_dispatch:

jobs:
  nuke-preview:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 挂载配置文件
        env:
          CONF: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"

      - name: 3. 执行雷达扫描 (绝不删除)
        run: |
          cat << 'EOF' > nuke.py
          import subprocess
          import json

          print("=== 🛡️ 演习模式开启：只查不删 ===")
          try:
              res = subprocess.run(['rclone', 'lsjson', '123pan:/abc', '-R', '--dirs-only'], capture_output=True, text=True, check=True)
              dirs = json.loads(res.stdout)
          except Exception as e:
              print("❌ 读取失败，请检查 abc 文件夹是否存在！")
              exit(1)

          dirs.sort(key=lambda x: x['Path'].count('/'), reverse=True)

          empty_count = 0
          for d in dirs:
              full_path = f"123pan:/abc/{d['Path']}"
              
              # 手电筒侦查
              check = subprocess.run(['rclone', 'lsf', full_path], capture_output=True, text=True)
              contents = check.stdout.strip()
              
              if not contents:
                  # 这里只打印，把 purge 命令删掉了！
                  print(f"🎯 发现纯空文件夹，已锁定：[{d['Path']}]")
                  empty_count += 1
              else:
                  pass

          print(f"=== 🛡️ 演习结束！共发现 {empty_count} 个绝对空白的文件夹等待清理。 ===")
          print("如果名单核对无误，请换回上一版带有 purge 的代码正式开火！")
          EOF
          python nuke.py
