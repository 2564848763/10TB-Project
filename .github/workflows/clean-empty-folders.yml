name: 极致清理123云盘空文件夹

on:
  workflow_dispatch:

jobs:
  clean-empty-dirs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Rclone 核心组件
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 挂载 123云盘配置文件
        env:
          # 根据你的截图，这里精准匹配 RCLONE_CONFIG
          CONF: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          # 使用 Python 确保写入格式绝对不乱码
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"
          echo "=== 🔑 配置加载成功！你当前的网盘名字列表如下： ==="
          rclone listremotes

      - name: 3. 执行空文件夹清理
        run: |
          echo "=== 🚀 正在清理 123云盘 里的空壳文件夹... ==="
          
          # 注意：如果上面的列表显示的不是 [123pan:] 而是别的名字，
          # 你需要把下面这一行里的 123pan 换成那个名字。
          
          rclone rmdirs 123pan:/视频 --leave-root --checkers=32 -v
          
          echo "=== 🧹 清理完毕！ ==="
