name: 真正终极版-清理abc空文件夹

on:
  workflow_dispatch:

jobs:
  clean-empty-dirs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 挂载配置 (修复了致命的秘钥名字错误)
        env:
          # ！！！就是这里！！！改回了你真正正确的 RCLONE_CONF ！！！
          CONF: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"

      - name: 3. 执行多线程空壳清理
        run: |
          echo "=== 🚀 正在潜入 abc 文件夹执行清理... ==="
          
          # 使用最安全、最官方的 rmdirs 命令
          # || true 保证就算遇到装满正常文件的文件夹，也绝对亮绿灯不报错！
          rclone rmdirs 123pan:/abc --leave-root --checkers=32 -v || true
          
          echo "=== 🧹 垃圾清运完毕，空壳已全部摧毁！ ==="
