name: 终极精准狙击abc空文件夹 (无死角防报错版)

on:
  workflow_dispatch:

jobs:
  clean-empty-dirs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 极速安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 无损挂载配置
        env:
          CONF: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"

      - name: 3. 执行精密外科手术式清理
        run: |
          cat << 'EOF' > clean.py
          import subprocess

          print("=== 🚀 正在开启最高精度雷达扫描 abc 文件夹 ===")
          
          # 1. 揪出所有子文件夹（使用绝对路径 123pan:/abc 保证不迷路）
          res = subprocess.run(['rclone', 'lsf', '123pan:/abc', '-R', '--dirs-only'], capture_output=True, text=True)
          if res.returncode != 0:
              print(f"❌ 扫描失败，123云盘报错：{res.stderr}")
              exit(0)  # 强行让脚本绿灯通过，不给你报红
          
          # 2. 核心清洗：切掉所有多余的斜杠！并按深度排序（先拔深层的，再拔外层的）
          dirs = [d.strip().strip('/') for d in res.stdout.split('\n') if d.strip()]
          dirs.sort(key=lambda x: x.count('/'), reverse=True)

          count = 0
          print(f"📡 共发现 {len(dirs)} 个子文件夹，正在逐一排查谁是空壳...")
          
          for d in dirs:
              # 拼凑出绝对干净、没有双斜杠的完美路径
              full_path = f"123pan:/abc/{d}"
              
              # 3. 拿手电筒照一下里面有没有文件
              check = subprocess.run(['rclone', 'lsf', full_path], capture_output=True, text=True)
              contents = check.stdout.strip()
              
              if not contents:
                  print(f"🎯 锁定绝对空壳：[{d}]")
                  # 4. 动用最稳妥的单点安全移除命令 rmdir
                  del_res = subprocess.run(['rclone', 'rmdir', full_path], capture_output=True, text=True)
                  
                  if del_res.returncode == 0:
                      print("   ✅ 狙击粉碎成功！")
                      count += 1
                  else:
                      print(f"   ⚠️ 云盘拒绝放行，原因：{del_res.stderr.strip()}")
              
          print(f"\n=== 🧹 战斗彻底结束！共成功清除了 {count} 个顽固空壳！ ===")
          EOF
          python clean.py
