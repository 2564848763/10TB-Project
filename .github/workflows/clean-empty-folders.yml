name: 极致清理abc空文件夹 (Bash原生爆破版)

on:
  workflow_dispatch:

jobs:
  nuke-empty-dirs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 极速安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 无损挂载配置文件
        env:
          CONF: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"

      - name: 3. 执行雷霆爆破 (只抹除纯空壳)
        run: |
          echo "=== 🚀 开始雷达扫描 abc 文件夹 ==="
          
          # 修正路径 Bug：去掉了 /，直接用 123pan:abc
          # 取出所有子文件夹名单，并倒序排列（保证先删最深层的小空壳，再删外层的大空壳）
          rclone lsf "123pan:abc" -R --dirs-only | sort -r > dirs.txt
          
          count=0
          # 逐个检查这些文件夹
          while IFS= read -r dir; do
              # 拿手电筒照一下，看看里面还有没有哪怕一个文件
              contents=$(rclone lsf "123pan:abc/$dir")
              
              if [ -z "$contents" ]; then
                  echo "🎯 锁定纯白幽灵：[$dir]"
                  echo "   🔫 正在动用 Purge 强制抹除..."
                  
                  # 动用核按钮强行抹除，无视 123云盘的拦截
                  rclone purge "123pan:abc/$dir"
                  count=$((count+1))
              fi
          done < dirs.txt
          
          echo "=== 🧹 战斗彻底结束！共强行粉碎了 $count 个空文件夹！ ==="
