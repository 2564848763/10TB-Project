name: 删除123网盘空文件夹(一次清除)

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 一次清理所有空文件夹
        env:
          PAN123_USER: ${{ secrets.PAN123_USER }}
          PAN123_PASS: ${{ secrets.PAN123_PASS }}
        run: |
          pip install webdavclient3
          python -c "
          import os
          from webdav3.client import Client

          client = Client({
              'webdav_hostname': 'https://webdav.123pan.cn/webdav',
              'webdav_login': os.environ['PAN123_USER'],
              'webdav_password': os.environ['PAN123_PASS']
          })

          # 获取所有文件夹，并建立父子关系
          dirs = []
          parent_of = {}

          def scan(path='/'):
              for item in client.list(path, get_info=True):
                  if item['path'].rstrip('/') == path.rstrip('/'):
                      continue
                  if item['isdir']:
                      child = item['path']
                      parent_of[child] = path
                      dirs.append(child)
                      scan(child)

          scan('/')

          # 按深度从深到浅处理，保证先处理最底层文件夹
          dirs.sort(key=lambda p: p.count('/'), reverse=True)

          def is_empty(path):
              try:
                  # list 的内容如果只有 '..' 和 '.' 或不含任何条目（除本身），则为空
                  items = client.list(path)
                  # webdavclient3 的 list 返回的名称列表包含 '..' 和文件夹本身？实测。
                  # 更可靠的方法：用 list(path, get_info=False) 检查列表长度
                  return len([i for i in items if i.strip() not in ('', '.', '..')]) == 0
              except:
                  return False

          def try_delete(path):
              if is_empty(path):
                  client.rmdir(path)
                  print(f'已删除空文件夹: {path}')
                  # 向上回溯，父文件夹可能也变空
                  parent = parent_of.get(path)
                  if parent and parent != '/':
                      try_delete(parent)

          for d in dirs:
              try_delete(d)

          print('全部空文件夹清理完毕')
          "
