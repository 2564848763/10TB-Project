name: 删除123网盘空文件夹(一次清除)

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 一次清理所有空文件夹
        env:
          PAN123_USER: ${{ secrets.PAN123_USER }}
          PAN123_PASS: ${{ secrets.PAN123_PASS }}
        run: |
          pip install webdavclient3
          python -c "
          import os
          from webdav3.client import Client

          client = Client({
              'webdav_hostname': 'https://webdav.123pan.cn',  # 只写基础地址
              'webdav_login': os.environ['PAN123_USER'],
              'webdav_password': os.environ['PAN123_PASS']
          })

          # 根目录从 /webdav 开始
          ROOT = '/webdav'

          dirs = []
          parent_of = {}

          def scan(path):
              for item in client.list(path, get_info=True):
                  if item['path'].rstrip('/') == path.rstrip('/'):
                      continue
                  if item['isdir']:
                      child = item['path']
                      parent_of[child] = path
                      dirs.append(child)
                      scan(child)

          scan(ROOT)

          dirs.sort(key=lambda p: p.count('/'), reverse=True)

          def is_empty(path):
              try:
                  items = client.list(path)
                  return len([i for i in items if i.strip() not in ('', '.', '..')]) == 0
              except:
                  return False

          def try_delete(path):
              if is_empty(path):
                  client.rmdir(path)
                  print(f'✅ 已删除空文件夹: {path}')
                  parent = parent_of.get(path)
                  if parent and parent != ROOT:
                      try_delete(parent)

          for d in dirs:
              try_delete(d)

          print('🎉 全部空文件夹清理完毕')
          "
