name: 全盘大扫除-清理所有空文件夹

on:
  workflow_dispatch:

jobs:
  clean-empty-dirs:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 2. 挂载配置文件
        env:
          CONF: ${{ secrets.RCLONE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          python3 -c "import os; open(os.path.expanduser('~/.config/rclone/rclone.conf'), 'w').write(os.environ['CONF'])"

      - name: 3. 执行全盘清理
        run: |
          echo "=== 🚀 正在开启全盘雷达，扫描并清理 123云盘 所有的空文件夹 ==="
          
          # 123pan:/ 代表直接从网盘最外层大门开始往下扫
          # --checkers=32 开启32个线程极速扫描
          
          rclone rmdirs 123pan:/ --checkers=32 -v
          
          echo "=== 🧹 垃圾清运完毕，整个网盘现已完美无瑕！ ==="
