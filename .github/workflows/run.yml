name: GDrive to 123Pan Full Transfer

on:
  workflow_dispatch: # 手动触发

jobs:
  transfer-data:
    runs-on: ubuntu-latest
    # 设置较长的超时上限（GitHub 最大允许 360 分钟）
    timeout-minutes: 350 

    steps:
      - name: 开启 BBR 网络优化
        run: |
          sudo sysctl -w net.core.default_qdisc=fq
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr

      - name: 安装 Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: 载入配置文件
        env:
          RCLONE_CONF_DATA: ${{ secrets.RCLONE_CONF }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF_DATA" > ~/.config/rclone/rclone.conf

      - name: 执行全量迁移
        run: |
          # 核心命令：将 gdrive 根目录内容复制到 123pan 根目录
          # --transfers 8: 增加并发数提高速度
          # --buffer-size 128M: 增加内存缓冲区
          # --drive-chunk-size 128M: 优化谷歌云盘的大文件读取
          rclone copy gdrive:/ 123pan:/ \
            -v --stats=15s \
            --transfers=8 \
            --checkers=16 \
            --buffer-size=128M \
            --drive-chunk-size=128M \
            --ignore-errors
